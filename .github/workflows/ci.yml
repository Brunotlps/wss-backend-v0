name: CI

# Runs on every push to main and on every Pull Request targeting main.
# A failing test suite will block the PR merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    # Redis is required by tests that use Django cache (IsEnrolled permission,
    # throttling) and by Celery in ALWAYS_EAGER mode.
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pytest with coverage
        working-directory: backend
        run: pytest --cov=apps --cov-fail-under=80 -q
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          SECRET_KEY: ci-test-secret-key-not-used-in-production
          DEBUG: "True"
          DATABASE_URL: sqlite:///ci-test.db
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          ALLOWED_HOSTS: "localhost,127.0.0.1"
          CORS_ALLOWED_ORIGINS: "http://localhost:3000"
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
