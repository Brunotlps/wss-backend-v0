name: CI

# Runs on every push to main and on every Pull Request targeting main.
# Two parallel jobs gate the merge:
#   - lint: style + import order + migration drift (fast feedback, seconds)
#   - test: full pytest suite with coverage, against PostgreSQL (prod parity)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & migration check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: flake8
        working-directory: backend
        run: flake8 apps/ config/

      - name: black --check
        working-directory: backend
        run: black --check apps/ config/

      - name: isort --check
        working-directory: backend
        run: isort --check-only apps/ config/

      # Fails if a model change has no matching migration (drift would break deploy).
      - name: Migrations are up to date
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          SECRET_KEY: ci-lint-secret-not-used-in-production
          DEBUG: "True"
          DATABASE_URL: sqlite:///ci-lint.db
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          ALLOWED_HOSTS: "localhost,127.0.0.1"
          CORS_ALLOWED_ORIGINS: "http://localhost:3000"
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder

  test:
    name: Run test suite (PostgreSQL)
    runs-on: ubuntu-latest

    # PostgreSQL matches production (closer parity than the previous SQLite run);
    # Redis is required by the Django cache (IsEnrolled, throttling) and Celery
    # in ALWAYS_EAGER mode.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wss
          POSTGRES_PASSWORD: wss
          POSTGRES_DB: wss_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wss"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: ci-test-secret-key-not-used-in-production
      DEBUG: "True"
      DATABASE_URL: postgres://wss:wss@localhost:5432/wss_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Django system check
        working-directory: backend
        run: python manage.py check

      - name: Run pytest with coverage
        working-directory: backend
        run: pytest --cov=apps --cov-fail-under=80 -q
