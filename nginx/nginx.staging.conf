# Nginx reverse proxy — Staging Environment
#
# Mirrors production config but listens on ports 8080/8443 and
# serves staging.api.nousflow.com.br. Cloudflare DNS proxies
# traffic from the staging subdomain to port 8080/8443 on the VPS.

worker_processes auto;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml;
    gzip_min_length 1024;
    gzip_vary on;

    upstream django {
        server wss_staging_backend:8000;
    }

    # Default server — drop unrecognized Host headers
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    # HTTP — port 80 (mapped to 8080 on host)
    server {
        listen 80;
        server_name staging.api.nousflow.com.br;

        client_max_body_size 500M;

        add_header X-Frame-Options       "DENY"            always;
        add_header X-Content-Type-Options "nosniff"        always;
        add_header Referrer-Policy       "same-origin"     always;

        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        location / {
            proxy_pass         http://django;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering         on;
            proxy_buffer_size       8k;
            proxy_buffers           8 8k;
            proxy_read_timeout      120s;
            proxy_connect_timeout   10s;
            proxy_send_timeout      120s;
        }
    }
}
