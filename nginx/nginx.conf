    #         proxy_send_timeout      120s;
    #     }
    # }
    #
    # Redirect HTTP → HTTPS (uncomment together with the block above)
    # server {
    #     listen 80;
    #     server_name yourdomain.com www.yourdomain.com;
    #     return 301 https://$host$request_uri;
    # }
}
