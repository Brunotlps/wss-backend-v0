# Nginx reverse proxy configuration for WSS Backend
#
# Serves as the entry point for all HTTP traffic:
#   - Proxies API requests to Gunicorn (wss_backend:8000)
#   - Serves /static/ and /media/ directly from volumes (no Django involved)
#   - Compresses responses with gzip
#   - Buffers slow client uploads to protect Gunicorn workers
#
# HTTPS setup (after obtaining a certificate via Certbot):
#   1. Run: certbot --nginx -d yourdomain.com
#   2. Uncomment the HTTPS server block below
#   3. Restart Nginx: docker-compose restart nginx

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ---------------------------------------------------------------
    # Real client IP behind Cloudflare (#48)
    #
    # Trust Cloudflare's edge ranges and read the real client IP from the
    # CF-Connecting-IP header. nginx only honors this header when the immediate
    # peer is one of the ranges below, so a direct attacker (e.g. on the DNS-only
    # upload subdomain) cannot spoof it — their untrusted IP stays in $remote_addr.
    # Source: https://www.cloudflare.com/ips/ (refresh periodically).
    # ---------------------------------------------------------------
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # Resolve the backend at request time via Docker's embedded DNS (#114).
    #
    # A static `upstream` / `proxy_pass http://name` resolves the backend name
    # once at worker start and pins that IP for the worker's lifetime. When the
    # backend container changes IP (restart/recreate/deploy, or a network
    # reshuffle) nginx then hits a dead IP and returns 502 site-wide until it is
    # restarted. Using the embedded resolver plus a variable in proxy_pass
    # (`http://$backend`) makes nginx re-resolve the name per request (cached for
    # `valid=`), so a backend IP change self-heals without an nginx restart.
    resolver 127.0.0.11 valid=30s ipv6=off;
    map $host $backend {
        default "wss_backend:8000";
    }

    # -------------------------------------------------------
    # Default server — drop requests with unrecognized Host header
    # Blocks bots/scanners probing the IP with random domains
    # -------------------------------------------------------
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    # -------------------------------------------------------
    # HTTP — port 80
    # -------------------------------------------------------
    server {
        listen 80;
        server_name api.nousflow.com.br;

        # Max upload size (video uploads can be large)
        client_max_body_size 500M;

        # Security headers
        add_header X-Frame-Options       "DENY"            always;
        add_header X-Content-Type-Options "nosniff"        always;
        add_header Referrer-Policy       "same-origin"     always;

        # Static files — served directly, no Django/Gunicorn involved
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Media files — user uploads (videos, certificates)
        # Thumbnails are non-sensitive marketing images — kept public.
        # Longest-prefix match wins over the protected /media/videos/ block.
        location /media/videos/thumbnails/ {
            alias /app/media/videos/thumbnails/;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        # Paid video content (#54) and certificate PDFs with PII (#74): no public
        # URL. Direct requests are blocked; bytes are served only via an
        # X-Accel-Redirect from an authenticated Django view (IsEnrolled /
        # IsCertificateOwner) to the internal /protected/ location below.
        location /media/videos/ {
            internal;
        }

        location /media/certificates/ {
            internal;
        }

        location /protected/ {
            internal;
            alias /app/media/;
        }

        # Remaining media (non-sensitive uploads) stays public.
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        # Admin — extended client_body_timeout for large video uploads
        # client_body_timeout governs max time between successive reads from the
        # client body. Default 60s can drop slow connections before the file
        # finishes uploading to Nginx. proxy_request_buffering stays ON so
        # Gunicorn workers are only allocated after the full file is buffered.
        location /admin/ {
            proxy_pass         http://$backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering         on;
            proxy_buffer_size       8k;
            proxy_buffers           8 8k;
            proxy_read_timeout      120s;
            proxy_connect_timeout   10s;
            proxy_send_timeout      120s;
            client_body_timeout     300s;
        }

        # All other requests → Gunicorn
        location / {
            proxy_pass         http://$backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Buffer settings — protect Gunicorn workers from slow clients
            proxy_buffering         on;
            proxy_buffer_size       8k;
            proxy_buffers           8 8k;
            proxy_read_timeout      120s;
            proxy_connect_timeout   10s;
            proxy_send_timeout      120s;
        }
    }

    # -------------------------------------------------------
    # HTTPS — port 443
    # -------------------------------------------------------
    server {
        listen 443 ssl;
        server_name api.nousflow.com.br;

        ssl_certificate     /etc/letsencrypt/live/api.nousflow.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.nousflow.com.br/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 500M;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "DENY"        always;
        add_header X-Content-Type-Options     "nosniff"     always;
        add_header Referrer-Policy            "same-origin" always;

        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Thumbnails are non-sensitive marketing images — kept public.
        # Longest-prefix match wins over the protected /media/videos/ block.
        location /media/videos/thumbnails/ {
            alias /app/media/videos/thumbnails/;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        # Paid video content (#54) and certificate PDFs with PII (#74): no public
        # URL. Direct requests are blocked; bytes are served only via an
        # X-Accel-Redirect from an authenticated Django view (IsEnrolled /
        # IsCertificateOwner) to the internal /protected/ location below.
        location /media/videos/ {
            internal;
        }

        location /media/certificates/ {
            internal;
        }

        location /protected/ {
            internal;
            alias /app/media/;
        }

        # Remaining media (non-sensitive uploads) stays public.
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        location /admin/ {
            proxy_pass         http://$backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering         on;
            proxy_buffer_size       8k;
            proxy_buffers           8 8k;
            proxy_read_timeout      120s;
            proxy_connect_timeout   10s;
            proxy_send_timeout      120s;
            client_body_timeout     300s;
        }

        location / {
            proxy_pass         http://$backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering         on;
            proxy_buffer_size       8k;
            proxy_buffers           8 8k;
            proxy_read_timeout      120s;
            proxy_connect_timeout   10s;
            proxy_send_timeout      120s;
        }
    }

    # -------------------------------------------------------
    # HTTPS — upload subdomain (bypasses Cloudflare proxy)
    #
    # Dedicated host for large media uploads via Django Admin.
    # The DNS record for upload.nousflow.com.br is "DNS only" (gray cloud),
    # so traffic reaches the VPS directly — avoiding Cloudflare Free's 100MB
    # request body limit. The API and frontend keep using api.nousflow.com.br
    # behind the Cloudflare proxy (WAF/DDoS protection intact).
    # -------------------------------------------------------
    server {
        listen 443 ssl;
        server_name upload.nousflow.com.br;

        ssl_certificate     /etc/letsencrypt/live/upload.nousflow.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/upload.nousflow.com.br/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 500M;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "DENY"        always;
        add_header X-Content-Type-Options     "nosniff"     always;
        add_header Referrer-Policy            "same-origin" always;

        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Thumbnails are non-sensitive marketing images — kept public.
        # Longest-prefix match wins over the protected /media/videos/ block.
        location /media/videos/thumbnails/ {
            alias /app/media/videos/thumbnails/;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        # Paid video content (#54) and certificate PDFs with PII (#74): no public
        # URL. Direct requests are blocked; bytes are served only via an
        # X-Accel-Redirect from an authenticated Django view (IsEnrolled /
        # IsCertificateOwner) to the internal /protected/ location below.
        location /media/videos/ {
            internal;
        }

        location /media/certificates/ {
            internal;
        }

        location /protected/ {
            internal;
            alias /app/media/;
        }

        # Remaining media (non-sensitive uploads) stays public.
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        location /admin/ {
            proxy_pass         http://$backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering         on;
            proxy_buffer_size       8k;
            proxy_buffers           8 8k;
            proxy_read_timeout      120s;
            proxy_connect_timeout   10s;
            proxy_send_timeout      120s;
            client_body_timeout     300s;
        }

        location / {
            proxy_pass         http://$backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering         on;
            proxy_buffer_size       8k;
            proxy_buffers           8 8k;
            proxy_read_timeout      120s;
            proxy_connect_timeout   10s;
            proxy_send_timeout      120s;
        }
    }
}
