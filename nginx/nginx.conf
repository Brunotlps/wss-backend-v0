# Nginx reverse proxy configuration for WSS Backend
#
# Serves as the entry point for all HTTP traffic:
#   - Proxies API requests to Gunicorn (wss_backend:8000)
#   - Serves /static/ and /media/ directly from volumes (no Django involved)
#   - Compresses responses with gzip
#   - Buffers slow client uploads to protect Gunicorn workers
#
# HTTPS setup (after obtaining a certificate via Certbot):
#   1. Run: certbot --nginx -d yourdomain.com
#   2. Uncomment the HTTPS server block below
#   3. Restart Nginx: docker-compose restart nginx

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Upstream: Gunicorn running inside the backend container
    upstream django {
        server wss_backend:8000;
    }

    # -------------------------------------------------------
    # HTTP — port 80
    # -------------------------------------------------------
    server {
        listen 80;
        server_name _;  # Accept any hostname (replace with your domain in production)

        # Max upload size (video uploads can be large)
        client_max_body_size 500M;

        # Security headers
        add_header X-Frame-Options       "DENY"            always;
        add_header X-Content-Type-Options "nosniff"        always;
        add_header Referrer-Policy       "same-origin"     always;

        # Static files — served directly, no Django/Gunicorn involved
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Media files — user uploads (videos, certificates)
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        # All other requests → Gunicorn
        location / {
            proxy_pass         http://django;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Buffer settings — protect Gunicorn workers from slow clients
            proxy_buffering         on;
            proxy_buffer_size       8k;
            proxy_buffers           8 8k;
            proxy_read_timeout      120s;
            proxy_connect_timeout   10s;
            proxy_send_timeout      120s;
        }
    }

    # -------------------------------------------------------
    # HTTPS — port 443
    # Uncomment after running: certbot --nginx -d yourdomain.com
    # Certbot will generate the certificate files referenced below.
    # -------------------------------------------------------
    #
    # server {
    #     listen 443 ssl;
    #     server_name yourdomain.com www.yourdomain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     client_max_body_size 500M;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    #     add_header X-Frame-Options            "DENY"        always;
    #     add_header X-Content-Type-Options     "nosniff"     always;
    #     add_header Referrer-Policy            "same-origin" always;
    #
    #     location /static/ {
    #         alias /app/staticfiles/;
    #         expires 30d;
    #         add_header Cache-Control "public, immutable";
    #         access_log off;
    #     }
    #
    #     location /media/ {
    #         alias /app/media/;
    #         expires 7d;
    #         add_header Cache-Control "public";
    #         access_log off;
    #     }
    #
    #     location / {
    #         proxy_pass         http://django;
    #         proxy_set_header   Host              $host;
    #         proxy_set_header   X-Real-IP         $remote_addr;
    #         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto $scheme;
    #         proxy_buffering         on;
    #         proxy_buffer_size       8k;
    #         proxy_buffers           8 8k;
    #         proxy_read_timeout      120s;
